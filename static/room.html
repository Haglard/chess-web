<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vibe Chess — Stanza</title>

<!-- chessboard.js + chess.js -->
<link rel="stylesheet"
  href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --accent:  #58a6ff;
    --green:   #3fb950;
    --orange:  #d29922;
    --red:     #f85149;
    --text:    #e6edf3;
    --muted:   #8b949e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header .logo { font-size: 20px; font-weight: 700; color: var(--accent); text-decoration: none; }
  header .logo span { color: var(--text); }
  header .sep { color: var(--border); }
  header .room-id { font-size: 13px; color: var(--muted); font-family: monospace; }
  header .copy-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
    transition: all .15s;
  }
  header .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Layout principale ── */
  .main {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 28px;
    padding: 28px 24px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Board column ── */
  .board-col { flex-shrink: 0; }

  /* ── Player strip (above/below board) ── */
  .player-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 4px;
    font-size: 14px;
    font-weight: 600;
  }
  .piece-icon { font-size: 18px; }
  .player-name { flex: 1; }
  .player-strip.active .player-name { color: var(--accent); }

  .player-clock {
    font-family: 'SF Mono', monospace; font-size: 18px; font-weight: 700;
    color: var(--muted); min-width: 64px; text-align: right;
    background: rgba(255,255,255,.04); border-radius: 5px;
    padding: 2px 8px; transition: color .3s;
  }
  .player-strip.active .player-clock { color: var(--text); }
  .player-strip.active .player-clock.clock-low { color: var(--red) !important; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }

  .captured-row { font-size:14px; letter-spacing:-1px; min-height:16px; line-height:1; margin-top:2px; }

  .adv-wrap { display:flex; align-items:center; gap:8px; margin-top:4px; }
  .adv-bar-bg { flex:1; height:6px; border-radius:3px; background:var(--border); overflow:hidden; position:relative; }
  .adv-bar-fill { position:absolute; top:0; height:100%; border-radius:3px; transition: all .4s ease; }
  .adv-fill-white { background: #f0d9b5; left:50%; }
  .adv-fill-black { background: #6e6e6e; right:50%; }
  .adv-num { font-size:12px; font-weight:700; min-width:28px; }
  .adv-num-white { color:#c8a96e; }
  .adv-num-black { color:#8b949e; }

  .total-timer { font-family: monospace; font-size:26px; font-weight:700; color:var(--accent); text-align:center; letter-spacing:3px; margin-top:6px; }

  .engine-grid { display:grid; grid-template-columns: auto 1fr; gap:3px 12px; font-size:12px; }
  .engine-grid .el { color:var(--muted); }
  .engine-grid .ev { font-family:monospace; font-weight:600; text-align:right; }
  .score-pos { color:#e8c97a; }
  .score-neg { color:#7ec8a4; }
  .score-zero { color:var(--muted); }

  /* ── Info panel ── */
  .info-col {
    flex: 1;
    min-width: 240px;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card h3 {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 10px;
  }

  /* Status */
  #statusText {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot-status {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    flex-shrink: 0;
  }
  .dot-status.up   { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-status.down { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .dot-status.wait { background: var(--orange); }

  #resultBanner {
    display: none;
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    background: rgba(88,166,255,.10);
    border: 1px solid rgba(88,166,255,.2);
    color: var(--accent);
  }

  /* Mosse */
  #moveList {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 8px;
    max-height: 280px;
    overflow-y: auto;
    font-size: 13px;
    font-family: monospace;
  }
  #moveList li { padding: 2px 4px; border-radius: 3px; }
  #moveList li.move-num { color: var(--muted); font-weight: 600; grid-column: 1; }
  #moveList li.move-w   { grid-column: 1; }
  #moveList li.move-b   { grid-column: 2; }
  #moveList li.last-move { background: rgba(88,166,255,.12); color: var(--accent); }

  /* Bottoni azione */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 6px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    width: 100%; justify-content: center;
  }
  .btn:hover:not(:disabled) { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }

  /* Waiting overlay */
  #waitOverlay {
    position: absolute; inset: 0;
    background: rgba(13,17,23,.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; border-radius: 4px;
    font-size: 15px; color: var(--muted);
  }
  .board-wrap { position: relative; }
  .spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 8px;
    font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.5);
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200;
  }
  #toast.show { opacity: 1; }

  /* Responsive */
  @media (max-width: 680px) {
    .main { flex-direction: column; align-items: center; }
    .info-col { max-width: 100%; width: 100%; }
  }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">♟ Vibe<span>Chess</span></a>
  <span class="sep">›</span>
  <span class="room-id" id="headerRoomId">—</span>
  <button class="copy-btn" onclick="copyLink()">📋 Copia link</button>
</header>

<div class="main">
  <!-- Board column -->
  <div class="board-col">
    <div class="player-strip" id="topPlayer">
      <span id="topIcon" style="font-size:16px">⬛</span>
      <div style="flex:1;min-width:0;overflow:hidden">
        <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="topName">—</div>
        <div class="captured-row" id="topCaptured"></div>
      </div>
      <span class="player-clock" id="topClock">0:00</span>
    </div>
    <div class="board-wrap">
      <div id="board" style="width:420px"></div>
      <div id="waitOverlay">
        <div class="spinner"></div>
        <span id="waitMsg">In attesa dell'avversario…</span>
      </div>
    </div>
    <div class="player-strip" id="bottomPlayer">
      <span id="bottomIcon" style="font-size:16px">⬜</span>
      <div style="flex:1;min-width:0;overflow:hidden">
        <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="bottomName">—</div>
        <div class="captured-row" id="bottomCaptured"></div>
      </div>
      <span class="player-clock" id="bottomClock">0:00</span>
    </div>
  </div>

  <!-- Info panel -->
  <div class="info-col">

    <!-- Stato + timer totale -->
    <div class="card">
      <h3>Stato partita</h3>
      <div id="statusText" style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px">
        <span class="dot-status wait"></span><span id="statusLabel">In attesa…</span>
      </div>
      <div class="total-timer" id="totalTimer">0:00</div>
      <div id="resultBanner"></div>
    </div>

    <!-- Vantaggio materiale -->
    <div class="card">
      <h3>Vantaggio materiale</h3>
      <div class="adv-wrap">
        <span class="adv-num adv-num-white" id="advW">—</span>
        <div class="adv-bar-bg">
          <div class="adv-bar-fill adv-fill-white" id="advFillW" style="width:0"></div>
          <div class="adv-bar-fill adv-fill-black" id="advFillB" style="width:0"></div>
        </div>
        <span class="adv-num adv-num-black" id="advB">—</span>
      </div>
    </div>

    <!-- Pezzi catturati -->
    <div class="card">
      <h3>Pezzi catturati</h3>
      <div style="display:flex;flex-direction:column;gap:5px;font-size:13px">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="color:var(--muted);font-size:11px;width:20px">⬜</span>
          <span id="capturedByWhite" style="font-size:15px;letter-spacing:-1px">—</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="color:var(--muted);font-size:11px;width:20px">⬛</span>
          <span id="capturedByBlack" style="font-size:15px;letter-spacing:-1px">—</span>
        </div>
      </div>
    </div>

    <!-- Stats motore (solo UvsC) -->
    <div class="card" id="engineCard" style="display:none">
      <h3>Ultima analisi IA</h3>
      <div class="engine-grid">
        <span class="el">Profondità</span><span class="ev" id="esDepth">—</span>
        <span class="el">Valutazione</span><span class="ev" id="esScore">—</span>
        <span class="el">Nodi esplorati</span><span class="ev" id="esNodes">—</span>
        <span class="el">Velocità</span><span class="ev" id="esNps">—</span>
        <span class="el">Tempo calcolo</span><span class="ev" id="esTime">—</span>
      </div>
    </div>

    <!-- Mosse -->
    <div class="card">
      <h3>Mosse</h3>
      <ul id="moveList"></ul>
    </div>

    <!-- Azioni -->
    <div class="card">
      <h3>Azioni</h3>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-ghost" onclick="window.location='/'">← Lobby</button>
        <button class="btn btn-danger" id="resignBtn" onclick="resign()" disabled>Abbandona</button>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ── Parametri URL ─────────────────────────────────────────────────────────────
const roomId   = location.pathname.split('/').pop();
const params   = new URLSearchParams(location.search);
const myColor  = params.get('color')  || 'spectator';  // "white"|"black"|"spectator"
const myNick   = params.get('nick')   || 'Tu';
const isPlayer = myColor === 'white' || myColor === 'black';

document.getElementById('headerRoomId').textContent = 'Stanza ' + roomId;
document.title = `Vibe Chess — ${roomId}`;

// ── Stato locale ──────────────────────────────────────────────────────────────
const chess = new Chess();
let board   = null;
let gameActive = false;

let gameStartedAt  = null;
let moveTimestamps = [];
let clockW = 0, clockB = 0;   // secondi spesi
let clockInterval = null;
let roomType = 'UvsU';
let currentTurn = 'w';

// ── Chessboard.js ─────────────────────────────────────────────────────────────
function onDragStart(source, piece) {
  if (!gameActive || !isPlayer) return false;
  if (chess.game_over()) return false;
  const myTurn = (chess.turn() === 'w' && myColor === 'white')
              || (chess.turn() === 'b' && myColor === 'black');
  if (!myTurn) return false;
  // solo pezzi del proprio colore
  if ((myColor === 'white' && piece.startsWith('b')) ||
      (myColor === 'black' && piece.startsWith('w'))) return false;
  return true;
}

function onDrop(source, target, piece, newPos, oldPos, orientation) {
  // Prova la mossa con chess.js per validazione client
  const move = chess.move({ from: source, to: target, promotion: 'q' });
  if (move === null) return 'snapback';

  // Manda al server
  ws.send(JSON.stringify({ type: 'move', uci: source + target + (move.promotion || '') }));
}

function onSnapEnd() {
  board.position(chess.fen());
}

function initBoard(orientation) {
  board = Chessboard('board', {
    draggable:    isPlayer,
    position:     'start',
    orientation:  orientation,
    onDragStart:  onDragStart,
    onDrop:       onDrop,
    onSnapEnd:    onSnapEnd,
    pieceTheme:   '/static/img/chesspieces/wikipedia/{piece}.png',
  });
}

// Inizializza con orientamento provvisorio (aggiornato da "state")
initBoard(myColor === 'black' ? 'black' : 'white');

// ── Player strips ─────────────────────────────────────────────────────────────
function updatePlayerStrips(whiteName, blackName) {
  const orientation = board.orientation();
  // "top" è chi è in alto nella board = l'avversario
  const topColor    = orientation === 'white' ? 'black' : 'white';
  const bottomColor = orientation === 'white' ? 'white' : 'black';

  document.getElementById('topIcon').textContent    = topColor === 'black' ? '⬛' : '⬜';
  document.getElementById('bottomIcon').textContent = bottomColor === 'black' ? '⬛' : '⬜';
  document.getElementById('topName').textContent    = topColor === 'black' ? (blackName || '—') : (whiteName || '—');
  document.getElementById('bottomName').textContent = bottomColor === 'black' ? (blackName || '—') : (whiteName || '—');
}

function highlightTurn(turn) {
  const orientation = board.orientation();
  const bottomColor = orientation === 'white' ? 'white' : 'black';
  const bottomActive = (turn === bottomColor[0]);  // 'w' o 'b'
  document.getElementById('topPlayer').classList.toggle('active',  !bottomActive);
  document.getElementById('bottomPlayer').classList.toggle('active', bottomActive);
}

// ── Move list ─────────────────────────────────────────────────────────────────
function renderMoves(moves) {
  const ul = document.getElementById('moveList');
  ul.innerHTML = '';
  // Ricostruiamo per ottenere SAN
  const tmpChess = new Chess();
  const sans = [];
  for (const uci of moves) {
    const from = uci.slice(0,2), to = uci.slice(2,4), promo = uci[4] || undefined;
    const m = tmpChess.move({ from, to, promotion: promo });
    sans.push(m ? m.san : uci);
  }
  for (let i = 0; i < sans.length; i++) {
    if (i % 2 === 0) {
      const num = document.createElement('li');
      num.className = 'move-num';
      num.textContent = (i/2 + 1) + '.';
      // Non aggiungiamo il numero come elemento separato nel grid; lo mettiamo inline
    }
    const li = document.createElement('li');
    li.textContent = sans[i];
    li.className   = i % 2 === 0 ? 'move-w' : 'move-b';
    if (i === sans.length - 1) li.classList.add('last-move');
    // Prefissa la mossa bianca con il numero
    if (i % 2 === 0) li.textContent = (i/2 + 1) + '. ' + sans[i];
    ul.appendChild(li);
  }
  ul.scrollTop = ul.scrollHeight;
}

// ── Status ────────────────────────────────────────────────────────────────────
function setStatus(text, dotClass, turn) {
  const dot   = document.querySelector('.dot-status');
  const label = document.getElementById('statusLabel');
  dot.className   = 'dot-status ' + (dotClass || '');
  label.textContent = text;
  if (turn) highlightTurn(turn);
}

function showResult(result, reason) {
  const banner = document.getElementById('resultBanner');
  let txt = '';
  if      (result === '1-0')     txt = '⬜ Il bianco vince';
  else if (result === '0-1')     txt = '⬛ Il nero vince';
  else if (result === '1/2-1/2') txt = '½ Patta';
  if (reason) txt += ' — ' + reason;
  banner.textContent = txt;
  banner.style.display = 'block';
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function fmtClock(sec) {
  const s = Math.floor(sec);
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2,'0');
}
function fmtTotal(sec) {
  const s = Math.floor(sec);
  const m = Math.floor(s / 60);
  return String(m).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}

function rebuildClocks() {
  // Ricostruisce i tempi spesi da ogni giocatore dai timestamps
  clockW = 0; clockB = 0;
  if (!gameStartedAt) return;
  const times = [gameStartedAt, ...moveTimestamps];
  for (let i = 0; i + 1 < times.length; i++) {
    const dt = times[i+1] - times[i];
    if (i % 2 === 0) clockW += dt;   // turno bianco: mosse pari (0,2,4,...)
    else             clockB += dt;
  }
}

function updateClockDisplay() {
  const now = Date.now() / 1000;
  let wSec = clockW, bSec = clockB;
  if (gameActive && gameStartedAt) {
    const lastTs = moveTimestamps.length > 0
      ? moveTimestamps[moveTimestamps.length - 1]
      : gameStartedAt;
    const extra = now - lastTs;
    if (currentTurn === 'w') wSec += extra;
    else                     bSec += extra;
  }
  const orient = board ? board.orientation() : 'white';
  const topIsBlack = orient === 'white';
  document.getElementById('topClock').textContent    = fmtClock(topIsBlack ? bSec : wSec);
  document.getElementById('bottomClock').textContent = fmtClock(topIsBlack ? wSec : bSec);
  const total = gameStartedAt ? (now - gameStartedAt) : 0;
  document.getElementById('totalTimer').textContent  = fmtTotal(total);
}

function startClockTick() {
  if (clockInterval) clearInterval(clockInterval);
  clockInterval = setInterval(updateClockDisplay, 200);
}

// ── Material advantage ────────────────────────────────────────────────────────
const PVAL = { p:1, n:3, b:3, r:5, q:9, k:0 };
function updateMaterialAdvantage() {
  if (!chess) return;
  const fen = chess.fen().split(' ')[0];
  let w = 0, b = 0;
  for (const ch of fen) {
    if (ch === ch.toUpperCase() && PVAL[ch.toLowerCase()] !== undefined) w += PVAL[ch.toLowerCase()];
    else if (ch === ch.toLowerCase() && PVAL[ch] !== undefined) b += PVAL[ch];
  }
  const diff = w - b;  // positivo = bianco in vantaggio
  const maxAdv = 20;
  const pct = Math.min(Math.abs(diff) / maxAdv * 50, 50);

  document.getElementById('advFillW').style.width = diff > 0 ? pct + '%' : '0';
  document.getElementById('advFillB').style.width = diff < 0 ? pct + '%' : '0';
  document.getElementById('advW').textContent = diff > 0 ? '+' + diff : (diff === 0 ? '=' : '');
  document.getElementById('advB').textContent = diff < 0 ? '+' + Math.abs(diff) : (diff === 0 ? '=' : '');
}

// ── Captured pieces ───────────────────────────────────────────────────────────
const PIECE_EMOJI = {
  // pezzi NERI catturati dal bianco (simboli neri)
  white_captures: { q:'♛', r:'♜', b:'♝', n:'♞', p:'♟' },
  // pezzi BIANCHI catturati dal nero (simboli bianchi)
  black_captures: { Q:'♕', R:'♖', B:'♗', N:'♘', P:'♙' },
};
const CAPTURE_ORDER = ['q','r','b','n','p'];

function updateCaptured() {
  if (!chess) return;
  const startW = { P:8, R:2, N:2, B:2, Q:1, K:1 };
  const startB = { p:8, r:2, n:2, b:2, q:1, k:1 };
  const onBoard = { P:0, R:0, N:0, B:0, Q:0, p:0, r:0, n:0, b:0, q:0 };
  for (const ch of chess.fen().split(' ')[0]) {
    if (onBoard[ch] !== undefined) onBoard[ch]++;
  }
  // pezzi neri catturati dal bianco
  let capByWhite = '';
  for (const pt of CAPTURE_ORDER) {
    const captured = startB[pt] - (onBoard[pt] || 0);
    for (let i = 0; i < captured; i++) capByWhite += PIECE_EMOJI.white_captures[pt];
  }
  // pezzi bianchi catturati dal nero
  let capByBlack = '';
  for (const pt of CAPTURE_ORDER) {
    const PT = pt.toUpperCase();
    const captured = startW[PT] - (onBoard[PT] || 0);
    for (let i = 0; i < captured; i++) capByBlack += PIECE_EMOJI.black_captures[PT];
  }
  document.getElementById('capturedByWhite').textContent = capByWhite || '—';
  document.getElementById('capturedByBlack').textContent = capByBlack || '—';

  // anche negli strip
  const orient = board ? board.orientation() : 'white';
  document.getElementById('topCaptured').textContent    = orient === 'white' ? capByBlack : capByWhite;
  document.getElementById('bottomCaptured').textContent = orient === 'white' ? capByWhite : capByBlack;
}

// ── Engine stats ──────────────────────────────────────────────────────────────
function fmtNodes(n) {
  if (!n) return '—';
  if (n < 1000) return String(n);
  if (n < 1e6)  return (n/1000).toFixed(1) + 'k';
  return (n/1e6).toFixed(2) + 'M';
}

function updateEngineStats(stats) {
  if (!stats) return;
  document.getElementById('engineCard').style.display = 'block';
  document.getElementById('esDepth').textContent = stats.depth ?? '—';
  const cp = stats.score_cp;
  if (cp !== undefined && cp !== null) {
    const pawn = cp / 100;
    const str  = (pawn >= 0 ? '+' : '') + pawn.toFixed(2);
    const cls  = cp > 10 ? 'ev score-pos' : cp < -10 ? 'ev score-neg' : 'ev score-zero';
    const el   = document.getElementById('esScore');
    el.textContent = str;
    el.className   = cls;
  }
  document.getElementById('esNodes').textContent = fmtNodes(stats.nodes);
  document.getElementById('esNps').textContent   = fmtNodes(stats.nps) + '/s';
  document.getElementById('esTime').textContent  = stats.time_ms ? (stats.time_ms/1000).toFixed(1)+'s' : '—';
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${wsProto}://${location.host}/ws/${roomId}?color=${myColor}`);

ws.onopen = () => console.log('[ws] connesso');

ws.onmessage = (ev) => {
  const msg = JSON.parse(ev.data);
  console.log('[ws]', msg.type, msg);
  handleMessage(msg);
};

ws.onclose = () => {
  if (gameActive) toast('Connessione persa. Ricarica la pagina.', 5000);
};

function handleMessage(msg) {
  switch (msg.type) {

    case 'state': {
      // Stato iniziale alla connessione
      const whiteName = msg.white || '—';
      const blackName = msg.black || '—';

      roomType = msg.room_type || 'UvsU';
      if (msg.game_started_at) gameStartedAt = msg.game_started_at;
      if (msg.move_timestamps) moveTimestamps = msg.move_timestamps;
      currentTurn = msg.turn || 'w';

      // Orienta board
      const orient = myColor === 'black' ? 'black' : 'white';
      if (board.orientation() !== orient) board.orientation(orient);

      updatePlayerStrips(whiteName, blackName);

      // Ricostruisce posizione
      chess.reset();
      for (const uci of (msg.moves || [])) {
        const from = uci.slice(0,2), to = uci.slice(2,4), promo = uci[4];
        chess.move({ from, to, promotion: promo || undefined });
      }
      board.position(chess.fen(), false);
      renderMoves(msg.moves || []);

      rebuildClocks();
      updateMaterialAdvantage();
      updateCaptured();
      if (msg.last_engine_stats) updateEngineStats(msg.last_engine_stats);

      if (msg.status === 'waiting') {
        document.getElementById('waitOverlay').style.display = 'flex';
        document.getElementById('waitMsg').textContent = 'In attesa dell\'avversario…';
        setStatus('In attesa di un avversario', 'wait');
      } else if (msg.status === 'active') {
        document.getElementById('waitOverlay').style.display = 'none';
        gameActive = true;
        if (isPlayer) document.getElementById('resignBtn').disabled = false;
        const turn = msg.turn || 'w';
        setStatus(turn === 'w' ? '⬜ Turno del bianco' : '⬛ Turno del nero', 'up', turn);
        startClockTick();
      } else if (msg.status === 'finished') {
        document.getElementById('waitOverlay').style.display = 'none';
        setStatus('Partita terminata', '');
        if (msg.result) showResult(msg.result, '');
        updateClockDisplay();
      }
      break;
    }

    case 'room_full': {
      if (msg.game_started_at) gameStartedAt = msg.game_started_at;
      rebuildClocks();
      currentTurn = 'w';
      startClockTick();

      document.getElementById('waitOverlay').style.display = 'none';
      gameActive = true;
      if (isPlayer) document.getElementById('resignBtn').disabled = false;
      updatePlayerStrips(msg.white, msg.black);
      setStatus('⬜ Turno del bianco', 'up', 'w');
      toast('La partita è iniziata! Buona fortuna 🎉');
      break;
    }

    case 'move': {
      if (msg.move_ts) moveTimestamps.push(msg.move_ts);
      currentTurn = msg.turn || chess.turn();
      // Applica mossa ricevuta (potrebbe essere del computer o dell'avversario)
      if (!chess.fen().startsWith(msg.fen?.split(' ')[0] + ' ')) {
        // Resync se FEN non coincide
        chess.load(msg.fen);
      } else {
        const uci  = msg.uci;
        const from = uci.slice(0,2), to = uci.slice(2,4), promo = uci[4];
        chess.move({ from, to, promotion: promo || undefined });
      }
      board.position(chess.fen(), true);
      renderMoves(msg.moves || []);
      rebuildClocks();
      if (msg.engine_stats) updateEngineStats(msg.engine_stats);
      updateMaterialAdvantage();
      updateCaptured();
      const turn = msg.turn || (chess.turn());
      const turnStr = turn === 'w' ? 'w' : 'b';
      setStatus(turnStr === 'w' ? '⬜ Turno del bianco' : '⬛ Turno del nero', 'up', turnStr);
      break;
    }

    case 'game_over': {
      if (msg.move_ts) moveTimestamps.push(msg.move_ts);
      if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
      // Applica l'ultima mossa se presente
      if (msg.uci) {
        const uci  = msg.uci;
        const from = uci.slice(0,2), to = uci.slice(2,4), promo = uci[4];
        chess.move({ from, to, promotion: promo || undefined });
        board.position(chess.fen(), true);
        renderMoves(msg.moves || []);
      }
      updateMaterialAdvantage();
      updateCaptured();
      if (msg.engine_stats) updateEngineStats(msg.engine_stats);
      updateClockDisplay();
      gameActive = false;
      document.getElementById('resignBtn').disabled = true;
      setStatus('Partita terminata', '');
      showResult(msg.result, msg.reason);
      toast(
        msg.result === '1/2-1/2' ? 'Patta! ' + (msg.reason || '') :
        msg.result === '1-0'     ? '⬜ Il bianco vince! ' + (msg.reason || '') :
                                   '⬛ Il nero vince! ' + (msg.reason || '')
      , 5000);
      break;
    }

    case 'error': {
      // Rollback mossa rifiutata dal server
      chess.undo();
      board.position(chess.fen(), false);
      toast('⚠ ' + msg.msg, 3000);
      break;
    }
  }
}

// ── Azioni ────────────────────────────────────────────────────────────────────
function resign() {
  if (!gameActive || !isPlayer) return;
  if (!confirm('Sei sicuro di voler abbandonare la partita?')) return;
  ws.send(JSON.stringify({ type: 'resign' }));
}

function copyLink() {
  navigator.clipboard.writeText(location.origin + '/room/' + roomId)
    .then(() => toast('Link copiato! 📋'))
    .catch(() => toast('Impossibile copiare il link'));
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}
</script>
