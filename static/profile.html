<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profilo — Vibe Chess</title>
<script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=t;})()</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2129;
  --border: #30363d; --accent: #58a6ff; --purple: #a78bfa;
  --green: #3fb950; --orange: #d29922; --red: #f85149;
  --text: #e6edf3; --muted: #8b949e;
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
}
header {
  background: rgba(22,27,34,.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 32px; height: 58px;
  display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50;
}
.logo {
  font-size: 20px; font-weight: 800; text-decoration: none;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
header nav { margin-left: auto; display: flex; gap: 6px; align-items: center; }
#headerAuth { display: flex; gap: 6px; align-items: center; }
.nav-btn {
  font-size: 13px; font-weight: 500; text-decoration: none; padding: 5px 12px;
  border-radius: 6px; transition: all .15s; border: none; cursor: pointer;
  background: rgba(88,166,255,.1); color: var(--accent);
}
.nav-btn:hover { background: rgba(88,166,255,.18); }
.nav-btn-outline {
  background: rgba(255,255,255,.05); color: var(--text); border: 1px solid var(--border);
}
.nav-btn-outline:hover { background: rgba(255,255,255,.09); }

/* Dropdown – click-based */
.dropdown { position: relative; }
.dropdown-trigger {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: var(--text);
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: background .15s;
}
.dropdown-trigger:hover { background: rgba(255,255,255,.09); }
.dropdown-menu {
  display: none; position: absolute; right: 0; top: 100%;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  min-width: 140px; box-shadow: 0 8px 24px rgba(0,0,0,.5); z-index: 200; overflow: hidden;
}
.dropdown.open .dropdown-menu { display: block; }
.dropdown-menu a, .dropdown-menu button {
  display: block; width: 100%; padding: 9px 16px; font-size: 13px; color: var(--text);
  text-decoration: none; background: none; border: none; text-align: left; cursor: pointer;
  transition: background .12s;
}
.dropdown-menu a:hover, .dropdown-menu button:hover { background: rgba(255,255,255,.05); }

main { flex: 1; padding: 40px 24px; max-width: 860px; margin: 0 auto; width: 100%; }

.profile-header {
  display: flex; align-items: flex-start; gap: 24px; margin-bottom: 32px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 28px 32px;
}
.avatar-circle {
  width: 80px; height: 80px; border-radius: 50%; background: var(--surface2);
  border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 42px; flex-shrink: 0;
}
.profile-info { flex: 1; }
.profile-alias { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
.profile-bio { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
.profile-meta { font-size: 12px; color: var(--muted); }

/* Edit form (solo per il proprio profilo) */
.edit-section {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px 28px; margin-bottom: 28px; display: none;
}
.edit-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
.field input, .field textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); padding: 9px 13px; font-size: 14px; outline: none; font-family: inherit;
  resize: vertical; transition: border-color .15s;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,.12); }
.btn {
  padding: 9px 20px; border-radius: 7px; border: none; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .18s;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--purple)); color: #fff; }
.btn-primary:hover { opacity: .88; }
.btn-ghost { background: rgba(255,255,255,.05); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: rgba(255,255,255,.09); }

/* ELO badge */
.elo-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(88,166,255,.1); border: 1px solid rgba(88,166,255,.25);
  border-radius: 20px; padding: 4px 13px; font-size: 13px; font-weight: 700;
  color: var(--accent); margin-top: 8px;
}
.elo-badge .elo-icon { font-size: 15px; }

/* Stats */
.stats-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 16px; text-align: center;
}
.stat-val { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

/* Table */
.section-title {
  font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase;
  letter-spacing: .8px; margin-bottom: 14px;
}
.table-wrap { border: 1px solid var(--border); border-radius: 10px; overflow-x: auto; background: var(--surface); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  padding: 10px 14px; text-align: left; font-weight: 600; color: var(--muted);
  font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
  border-bottom: 1px solid var(--border); background: rgba(255,255,255,.02);
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(88,166,255,.04); }
tbody td { padding: 11px 14px; vertical-align: middle; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.badge-win  { background: rgba(63,185,80,.15);  color: var(--green); }
.badge-loss { background: rgba(248,81,73,.12);   color: var(--red); }
.badge-draw { background: rgba(88,166,255,.12);  color: var(--accent); }

.empty-state { text-align: center; padding: 40px 24px; color: var(--muted); font-size: 14px; }

@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
  .profile-header { flex-direction: column; align-items: center; text-align: center; }
}

/* ── Responsive ── */
@media (max-width: 640px) {
  header { padding: 0 14px; }
  main { padding: 20px 14px; }
  .profile-header { flex-direction: column; align-items: center; text-align: center; padding: 20px 16px; gap: 16px; }
  .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-card { padding: 12px 8px; }
  .stat-val { font-size: 22px; }
  .table-wrap { overflow-x: auto; }
  table { min-width: 560px; }
}
@media (max-width: 400px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── Theme toggle ── */
#themeToggle {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 9px; cursor: pointer; font-size: 15px; color: var(--muted);
  transition: all .15s; line-height: 1;
}
#themeToggle:hover { border-color: var(--accent); }

/* Light theme overrides */
[data-theme="light"] {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #e8ebf0;
  --border: #d0d7de;
  --text: #1a1f2e;
  --muted: #656d76;
}
[data-theme="light"] body { background-image: none !important; }
[data-theme="light"] header { background: rgba(240,242,245,.92) !important; }
[data-theme="light"] .dropdown-menu {
  background: var(--surface) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,.12) !important;
}
[data-theme="light"] .dropdown-menu {
  background: var(--surface) !important;
}
[data-theme="light"] .dropdown-menu a:hover,
[data-theme="light"] .dropdown-menu button:hover { background: rgba(0,0,0,.04) !important; }
[data-theme="light"] .dropdown-trigger { background: rgba(0,0,0,.04) !important; }
[data-theme="light"] .dropdown-trigger:hover { background: rgba(0,0,0,.07) !important; }
[data-theme="light"] .auth-btn-outline,
[data-theme="light"] .nav-btn-outline { background: rgba(0,0,0,.04) !important; }
</style>
</head>
<body>
<header>
  <a href="/" class="logo">♟ VibChess</a>
  <nav>
    <button id="themeToggle" onclick="toggleTheme()" title="Cambia tema">☀️</button>
    <div id="headerAuth"></div>
  </nav>
</header>

<main id="mainContent">
  <div style="text-align:center;padding:60px;color:var(--muted)">Caricamento profilo…</div>
</main>

<script>
// ── Theme toggle ────────────────────────────────────────────────────────────
function toggleTheme() {
  const t = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = t === 'light' ? '🌙' : '☀️';
}
document.addEventListener('DOMContentLoaded', function() {
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = (localStorage.getItem('theme')||'dark') === 'light' ? '🌙' : '☀️';
});

function setTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = t === 'light' ? '🌙' : '☀️';
  updateThemeButtons(t);
}
function updateThemeButtons(t) {
  const dark  = document.getElementById('themeDark');
  const light = document.getElementById('themeLight');
  if (!dark || !light) return;
  const base = 'padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid';
  dark.setAttribute('style',  t==='dark'  ? `${base} var(--accent);background:var(--accent);color:#fff`   : `${base} var(--border);background:none;color:var(--text)`);
  light.setAttribute('style', t==='light' ? `${base} var(--accent);background:var(--accent);color:#fff` : `${base} var(--border);background:none;color:var(--text)`);
}

const alias = location.pathname.split('/').pop();
let currentUser = null;

async function loadHeader() {
  try {
    const r = await fetch('/api/auth/me');
    const u = await r.json();
    currentUser = u.logged_in ? u : null;
    const el = document.getElementById('headerAuth');
    if (u.logged_in) {
      el.innerHTML = `
        <div class="dropdown" id="userDropdown">
          <button class="dropdown-trigger" id="dropdownBtn">
            <span style="font-size:18px">${u.avatar}</span>${u.alias}
          </button>
          <div class="dropdown-menu">
            <a href="/profile/${u.alias}">Profilo</a>
            <button onclick="logout()">Esci</button>
          </div>
        </div>`;
      document.getElementById('dropdownBtn').addEventListener('click', e => {
        e.stopPropagation();
        document.getElementById('userDropdown').classList.toggle('open');
      });
    } else {
      el.innerHTML = `
        <a href="/login" class="nav-btn">Accedi</a>
        <a href="/register" class="nav-btn nav-btn-outline">Registrati</a>`;
    }
  } catch(e) {}
}
// Chiudi dropdown cliccando fuori
document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
});

async function logout() {
  await fetch('/api/auth/logout', {method:'POST'});
  location.href = '/';
}

function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts * 1000).toLocaleDateString('it-IT', {day:'2-digit', month:'short', year:'numeric'});
}

function resultBadge(game, userId) {
  if (!game.result) return '<span class="badge" style="background:rgba(255,255,255,.07);color:var(--muted)">—</span>';
  const isWhite = game.white_user_id === userId;
  const isBlack = game.black_user_id === userId;
  if (!isWhite && !isBlack) {
    if (game.result === '1/2-1/2') return '<span class="badge badge-draw">Patta</span>';
    return `<span class="badge" style="background:rgba(255,255,255,.07);color:var(--muted)">${game.result}</span>`;
  }
  if (game.result === '1/2-1/2') return '<span class="badge badge-draw">Patta</span>';
  const won = (game.result === '1-0' && isWhite) || (game.result === '0-1' && isBlack);
  return won
    ? '<span class="badge badge-win">Vittoria</span>'
    : '<span class="badge badge-loss">Sconfitta</span>';
}

function isAI(nick) {
  return nick && (nick.includes('Engine') || nick.includes('ChatGPT'));
}

function playerLink(nick) {
  if (!nick) return '—';
  if (isAI(nick)) return `<span style="color:var(--muted)">${nick}</span>`;
  return `<a href="/profile/${nick}" style="color:var(--accent);text-decoration:none;font-weight:600">${nick}</a>`;
}

function eloDelta(game, userId) {
  const isWhite = game.white_user_id === userId;
  const isBlack = game.black_user_id === userId;
  if (!isWhite && !isBlack) return '—';
  if (game.room_type !== 'UvsU') return '<span style="color:var(--muted)">—</span>';
  const before = isWhite ? game.white_elo_before : game.black_elo_before;
  const after  = isWhite ? game.white_elo_after  : game.black_elo_after;
  if (before == null || after == null) return '<span style="color:var(--muted)">—</span>';
  const delta = after - before;
  const color = delta > 0 ? 'var(--green)' : delta < 0 ? 'var(--red)' : 'var(--muted)';
  const sign  = delta > 0 ? '+' : '';
  return `<span style="color:${color}">${sign}${delta}</span> <span style="color:var(--muted)">(${after})</span>`;
}

function typeLabel(type) {
  const map = {
    'UvsU': '👥 UvsU', 'UvsC': '♟ UvsC', 'UvChatGPT': '🧠 UvGPT',
    'CvChatGPT': '⚔️ CvGPT', 'CvC': '🏁 CvC'
  };
  return map[type] || type;
}

async function loadProfile() {
  await loadHeader();

  let profile, games;
  try {
    const [pr, gr] = await Promise.all([
      fetch(`/api/users/${alias}`),
      fetch(`/api/users/${alias}/games`)
    ]);
    if (!pr.ok) { showNotFound(); return; }
    profile = await pr.json();
    games = gr.ok ? await gr.json() : [];
  } catch(e) { showNotFound(); return; }

  // Calcola stats
  const userId = profile.id;
  let wins = 0, losses = 0, draws = 0;
  for (const g of games) {
    if (!g.result) continue;
    const isW = g.white_user_id === userId;
    const isB = g.black_user_id === userId;
    if (!isW && !isB) continue;
    if (g.result === '1/2-1/2') { draws++; continue; }
    if ((g.result === '1-0' && isW) || (g.result === '0-1' && isB)) wins++;
    else losses++;
  }
  const total = wins + losses + draws;

  const isOwn = currentUser && currentUser.alias === alias;

  document.getElementById('mainContent').innerHTML = `
    <div class="profile-header">
      <div class="avatar-circle" id="avatarDisp">${profile.avatar || '♟'}</div>
      <div class="profile-info">
        <div class="profile-alias">${profile.alias}</div>
        <div class="profile-bio" id="bioDisp">${profile.bio || '<span style="color:var(--muted);font-style:italic">Nessuna bio</span>'}</div>
        <div class="profile-meta">Membro dal ${fmtDate(profile.created_at)}</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px">
          <span class="elo-badge"><span class="elo-icon">📊</span> ELO ${profile.elo || 1200}</span>
          <a href="/leaderboard" style="font-size:12px;color:var(--muted);text-decoration:none">🏆 Classifica →</a>
        </div>
        ${isOwn ? '<button class="btn btn-ghost" style="margin-top:10px;font-size:12px" onclick="toggleEdit()">Modifica profilo</button>' : ''}
      </div>
    </div>

    ${isOwn ? `
    <div class="edit-section" id="editSection">
      <h3>Modifica profilo</h3>
      <div class="field">
        <label>Avatar (emoji)</label>
        <input type="text" id="editAvatar" value="${profile.avatar || '♟'}" maxlength="4" style="width:80px">
      </div>
      <div class="field">
        <label>Bio</label>
        <textarea id="editBio" rows="3" maxlength="300">${profile.bio || ''}</textarea>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" onclick="saveProfile()">Salva</button>
        <button class="btn btn-ghost" onclick="toggleEdit()">Annulla</button>
      </div>
    </div>
    ` : ''}

    <div class="stats-grid">
      <div class="stat-card" style="border-color:rgba(88,166,255,.3)">
        <div class="stat-val" style="color:var(--accent)">${profile.elo || 1200}</div>
        <div class="stat-label">ELO</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${total}</div>
        <div class="stat-label">Partite</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--green)">${wins}</div>
        <div class="stat-label">Vittorie</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--red)">${losses}</div>
        <div class="stat-label">Sconfitte</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--accent)">${draws}</div>
        <div class="stat-label">Patte</div>
      </div>
    </div>

    <div class="section-title">Preferenze</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:14px;font-weight:600;margin-bottom:3px">Tema interfaccia</div>
        <div style="font-size:13px;color:var(--muted)">Scegli tra tema scuro e tema chiaro</div>
      </div>
      <div style="display:flex;gap:8px">
        <button id="themeDark" onclick="setTheme('dark')" style="padding:7px 16px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s">🌙 Scuro</button>
        <button id="themeLight" onclick="setTheme('light')" style="padding:7px 16px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s">☀️ Chiaro</button>
      </div>
    </div>

    <div class="section-title">Storico partite</div>
    <div class="table-wrap">
      ${games.length === 0 ? '<div class="empty-state">Nessuna partita giocata ancora.</div>' : `
      <table>
        <thead>
          <tr>
            <th>Tipo</th>
            <th>⬜ Bianco</th>
            <th>⬛ Nero</th>
            <th>Esito</th>
            <th>ELO</th>
            <th>Motivo</th>
            <th>Mosse</th>
            <th>Data</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${games.map(g => `<tr>
            <td style="color:var(--muted)">${typeLabel(g.room_type)}</td>
            <td>${playerLink(g.white_alias)}</td>
            <td>${playerLink(g.black_alias)}</td>
            <td>${resultBadge(g, userId)}</td>
            <td style="font-size:12px;font-family:monospace">${eloDelta(g, userId)}</td>
            <td style="color:var(--muted);font-size:12px">${g.reason || '—'}</td>
            <td style="color:var(--muted);text-align:center">${g.moves_count}</td>
            <td style="color:var(--muted);font-size:12px">${fmtDate(g.ended_at)}</td>
            <td><a href="/replay/${g.room_id}" style="color:var(--accent);text-decoration:none;font-size:12px;font-weight:600;white-space:nowrap">▶ Replay</a></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  `;
  // Update theme buttons state after injecting content
  updateThemeButtons(localStorage.getItem('theme') || 'dark');
}

function showNotFound() {
  document.getElementById('mainContent').innerHTML = `
    <div style="text-align:center;padding:80px 24px;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:16px">♟</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px">Utente non trovato</div>
      <a href="/" style="color:var(--accent);text-decoration:none">← Torna alla lobby</a>
    </div>`;
}

function toggleEdit() {
  const el = document.getElementById('editSection');
  if (el) el.style.display = el.style.display === 'none' || !el.style.display ? 'block' : 'none';
}

async function saveProfile() {
  const bio    = document.getElementById('editBio').value;
  const avatar = document.getElementById('editAvatar').value.trim() || '♟';
  try {
    const res = await fetch('/api/users/me', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({bio, avatar})
    });
    if (res.ok) {
      document.getElementById('avatarDisp').textContent = avatar;
      document.getElementById('bioDisp').textContent = bio || '';
      toggleEdit();
    }
  } catch(e) {}
}

loadProfile();
</script>
</body>
</html>
