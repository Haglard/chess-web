<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reimposta password — Vibe Chess</title>
<script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=t;})()</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --accent: #58a6ff; --purple: #a78bfa; --green: #3fb950;
  --red: #f85149; --text: #e6edf3; --muted: #8b949e;
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
}
header {
  background: rgba(22,27,34,.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 32px; height: 58px;
  display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50;
}
.logo {
  font-size: 20px; font-weight: 800; text-decoration: none;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
header nav { margin-left: auto; display: flex; gap: 6px; align-items: center; }
#headerAuth { display: flex; gap: 6px; align-items: center; }
.nav-btn {
  font-size: 13px; font-weight: 500; text-decoration: none; padding: 5px 12px;
  border-radius: 6px; transition: all .15s; border: none; cursor: pointer;
  background: rgba(88,166,255,.1); color: var(--accent);
}
.nav-btn-outline {
  background: rgba(255,255,255,.05); color: var(--text); border: 1px solid var(--border);
}

/* ── Theme toggle ── */
#themeToggle {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 9px; cursor: pointer; font-size: 15px; color: var(--muted);
  transition: all .15s; line-height: 1;
}
#themeToggle:hover { border-color: var(--accent); }

/* Light theme overrides */
[data-theme="light"] {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #e8ebf0;
  --border: #d0d7de;
  --text: #1a1f2e;
  --muted: #656d76;
}
[data-theme="light"] body { background-image: none !important; }
[data-theme="light"] header { background: rgba(240,242,245,.92) !important; }
[data-theme="light"] .dropdown-menu {
  background: var(--surface) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,.12) !important;
}
[data-theme="light"] .dropdown-menu {
  background: var(--surface) !important;
}
[data-theme="light"] .dropdown-menu a:hover,
[data-theme="light"] .dropdown-menu button:hover { background: rgba(0,0,0,.04) !important; }
[data-theme="light"] .dropdown-trigger { background: rgba(0,0,0,.04) !important; }
[data-theme="light"] .dropdown-trigger:hover { background: rgba(0,0,0,.07) !important; }
[data-theme="light"] .auth-btn-outline,
[data-theme="light"] .nav-btn-outline { background: rgba(0,0,0,.04) !important; }

main {
  flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 36px 40px; width: 420px; max-width: 100%;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.card-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.card-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.field input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); padding: 10px 14px; font-size: 14px; outline: none;
  transition: border-color .15s;
}
.field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,.12); }
.btn {
  width: 100%; padding: 11px; border-radius: 8px; border: none; font-size: 15px;
  font-weight: 700; cursor: pointer; transition: all .18s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--purple)); color: #fff;
  box-shadow: 0 4px 18px rgba(88,166,255,.3);
}
.btn-primary:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.error-msg {
  color: var(--red); font-size: 13px; margin-bottom: 14px; display: none;
  padding: 9px 12px; background: rgba(248,81,73,.08); border-radius: 6px;
  border: 1px solid rgba(248,81,73,.2);
}
.invalid-token {
  text-align: center; padding: 24px; color: var(--muted);
}
</style>
</head>
<body>
<header>
  <a href="/" class="logo">♟ VibChess</a>
  <nav>
    <button id="themeToggle" onclick="toggleTheme()" title="Cambia tema">☀️</button>
    <div id="headerAuth"></div>
  </nav>
</header>

<main>
  <div class="card" id="formCard">
    <div class="card-title">🔒 Nuova password</div>
    <div class="card-sub">Scegli una nuova password sicura.</div>

    <div class="error-msg" id="errMsg"></div>

    <div class="field">
      <label>Nuova password</label>
      <input type="password" id="password" placeholder="Minimo 8 caratteri" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Conferma password</label>
      <input type="password" id="confirm" placeholder="Ripeti la password" autocomplete="new-password">
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="doReset()">Reimposta password</button>
  </div>

  <div class="card" id="invalidCard" style="display:none">
    <div class="invalid-token">
      <div style="font-size:48px;margin-bottom:16px">⚠️</div>
      <div style="font-size:17px;font-weight:700;margin-bottom:8px">Link non valido o scaduto</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:20px">Il link di reset è valido solo per 2 ore.</div>
      <a href="/forgot-password" style="color:var(--accent);text-decoration:none;font-weight:600">Richiedi un nuovo link →</a>
    </div>
  </div>
</main>

<script>
// ── Theme toggle ────────────────────────────────────────────────────────────
function toggleTheme() {
  const t = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = t === 'light' ? '🌙' : '☀️';
}
document.addEventListener('DOMContentLoaded', function() {
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = (localStorage.getItem('theme')||'dark') === 'light' ? '🌙' : '☀️';
});

const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('formCard').style.display = 'none';
  document.getElementById('invalidCard').style.display = 'block';
}

async function loadHeader() {
  try {
    const r = await fetch('/api/auth/me');
    const u = await r.json();
    const el = document.getElementById('headerAuth');
    if (u.logged_in) {
      el.innerHTML = `
        <a href="/profile/${u.alias}" style="color:var(--text);text-decoration:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px">
          <span style="font-size:18px">${u.avatar}</span>${u.alias}
        </a>
        <button class="nav-btn nav-btn-outline" onclick="logout()">Esci</button>`;
    } else {
      el.innerHTML = `
        <a href="/login" class="nav-btn">Accedi</a>
        <a href="/register" class="nav-btn nav-btn-outline">Registrati</a>`;
    }
  } catch(e) {}
}
async function logout() {
  await fetch('/api/auth/logout', {method:'POST'});
  location.href = '/';
}
loadHeader();

async function doReset() {
  const pw      = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const err     = document.getElementById('errMsg');
  err.style.display = 'none';

  if (pw.length < 8)    { err.textContent = 'Password troppo corta (minimo 8 caratteri)'; err.style.display = 'block'; return; }
  if (pw !== confirm)   { err.textContent = 'Le password non coincidono'; err.style.display = 'block'; return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Salvataggio…';

  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({token, password: pw})
    });
    const data = await res.json();
    if (!res.ok) {
      err.textContent = data.detail || 'Token non valido o scaduto';
      err.style.display = 'block';
      document.getElementById('formCard').style.display = 'none';
      document.getElementById('invalidCard').style.display = 'block';
      return;
    }
    location.href = '/login';
  } catch(e) {
    err.textContent = 'Errore di rete';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Reimposta password';
  }
}

document.getElementById('confirm') && document.getElementById('confirm').addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
