<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classifica ELO – VibChess</title>
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=t;})()</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f19;
      --surface: #141922;
      --surface2: #1a2030;
      --border: #2a3142;
      --accent: #58a6ff;
      --purple: #a78bfa;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --text: #e6edf3;
      --muted: #8b949e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      transition: color .15s;
    }
    .nav-link:hover { color: var(--text); }

    /* ── DROPDOWN ── */
    .dropdown { position: relative; }

    .dropdown-trigger {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color .15s;
    }
    .dropdown-trigger:hover { border-color: var(--accent); }

    .dropdown-menu {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-width: 150px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      z-index: 200;
    }
    .dropdown.open .dropdown-menu { display: block; }

    .dropdown-menu a,
    .dropdown-menu button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: background .12s;
    }
    .dropdown-menu a:hover,
    .dropdown-menu button:hover { background: var(--surface2); }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .section-sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* ── TABLE WRAP ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
    }
    th.right { text-align: right; }

    td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    td.right { text-align: right; }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: var(--surface2); }

    /* podio */
    .rank-1 td { font-weight: 600; }
    .rank-2 td { font-weight: 500; }
    .rank-3 td { font-weight: 500; }

    .rank-cell {
      font-size: 18px;
      min-width: 36px;
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .player-avatar { font-size: 20px; line-height: 1; }
    .player-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .player-link:hover { text-decoration: underline; }

    .elo-first { color: var(--accent); font-weight: 700; font-size: 15px; }

    /* stati */
    .state-row td {
      text-align: center;
      color: var(--muted);
      padding: 40px 16px;
      font-size: 15px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 24px;
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header { padding: 0 14px; }
      main { padding: 20px 14px; }
      .podium { gap: 8px; }
      .podium-card { padding: 16px 12px; min-width: 80px; }
      .table-wrap, .leaderboard-table-wrap { overflow-x: auto; }
      table { min-width: 440px; }
      .podium-name { font-size: 12px; }
    }

    /* ── Theme toggle ── */
    #themeToggle {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 9px; cursor: pointer; font-size: 15px; color: var(--muted);
      transition: all .15s; line-height: 1;
    }
    #themeToggle:hover { border-color: var(--accent); }

    /* Light theme overrides */
    [data-theme="light"] {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #e8ebf0;
      --border: #d0d7de;
      --text: #1a1f2e;
      --muted: #656d76;
    }
    [data-theme="light"] body { background-image: none !important; }
    [data-theme="light"] header { background: rgba(240,242,245,.92) !important; }
    [data-theme="light"] .dropdown-menu {
      background: var(--surface) !important;
      box-shadow: 0 8px 24px rgba(0,0,0,.12) !important;
    }
    [data-theme="light"] .dropdown-menu {
      background: var(--surface) !important;
    }
    [data-theme="light"] .dropdown-menu a:hover,
    [data-theme="light"] .dropdown-menu button:hover { background: rgba(0,0,0,.04) !important; }
    [data-theme="light"] .dropdown-trigger { background: rgba(0,0,0,.04) !important; }
    [data-theme="light"] .dropdown-trigger:hover { background: rgba(0,0,0,.07) !important; }
    [data-theme="light"] .auth-btn-outline,
    [data-theme="light"] .nav-btn-outline { background: rgba(0,0,0,.04) !important; }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">♟ VibChess</a>
    <nav>
      <a href="/" class="nav-link">← Lobby</a>
      <button id="themeToggle" onclick="toggleTheme()" title="Cambia tema">☀️</button>
      <div id="headerAuth"></div>
    </nav>
  </header>

  <main>
    <p class="section-title">🏆 Classifica ELO</p>
    <p class="section-sub">Solo partite Utente vs Utente</p>

    <div class="table-wrap">
      <table id="leaderboardTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Giocatore</th>
            <th class="right">ELO</th>
            <th class="right">Partite</th>
            <th class="right">Vittorie</th>
            <th class="right">Patte</th>
            <th class="right">Win%</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr class="state-row">
            <td colspan="7">Caricamento…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer>© 2026 Sandro Borioni</footer>

  <script>
    // ── Theme toggle ────────────────────────────────────────────────────────────
    function toggleTheme() {
      const t = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
      document.documentElement.dataset.theme = t;
      localStorage.setItem('theme', t);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = t === 'light' ? '🌙' : '☀️';
    }
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = (localStorage.getItem('theme')||'dark') === 'light' ? '🌙' : '☀️';
    });

    /* ── HEADER AUTH ── */
    async function loadHeader() {
      const r = await fetch('/api/auth/me');
      const u = await r.json();
      const el = document.getElementById('headerAuth');
      if (u.logged_in) {
        el.innerHTML = `<div class="dropdown" id="userDropdown">
          <button class="dropdown-trigger" id="dropdownBtn">
            <span style="font-size:17px">${u.avatar}</span>${u.alias}
          </button>
          <div class="dropdown-menu">
            <a href="/profile/${u.alias}">Profilo</a>
            <button onclick="doLogout()">Esci</button>
          </div>
        </div>`;
        document.getElementById('dropdownBtn').addEventListener('click', e => {
          e.stopPropagation();
          document.getElementById('userDropdown').classList.toggle('open');
        });
      } else {
        el.innerHTML = `<a href="/login" class="nav-link" style="color:var(--accent)">Accedi</a>`;
      }
    }

    document.addEventListener('click', () => {
      document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
    });

    async function doLogout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      location.href = '/';
    }

    /* ── LEADERBOARD ── */
    const MEDALS = ['🥇', '🥈', '🥉'];

    async function loadLeaderboard() {
      const tbody = document.getElementById('leaderboardBody');
      try {
        const r = await fetch('/api/leaderboard');
        const rows = await r.json();

        if (!Array.isArray(rows) || rows.length === 0) {
          tbody.innerHTML = `<tr class="state-row"><td colspan="7">Nessun giocatore in classifica.</td></tr>`;
          return;
        }

        tbody.innerHTML = rows.map((p, i) => {
          const pos = i + 1;
          const rankClass = pos <= 3 ? `rank-${pos}` : '';
          const rankDisplay = pos <= 3 ? MEDALS[i] : pos;
          const winPct = p.total_games > 0
            ? ((p.wins / p.total_games) * 100).toFixed(1) + '%'
            : '—';
          const eloHtml = pos === 1
            ? `<span class="elo-first">${p.elo}</span>`
            : p.elo;

          return `<tr class="${rankClass}">
            <td class="rank-cell">${rankDisplay}</td>
            <td>
              <div class="player-cell">
                <span class="player-avatar">${p.avatar}</span>
                <a href="/profile/${p.alias}" class="player-link">${p.alias}</a>
              </div>
            </td>
            <td class="right">${eloHtml}</td>
            <td class="right">${p.total_games}</td>
            <td class="right">${p.wins}</td>
            <td class="right">${p.draws}</td>
            <td class="right">${winPct}</td>
          </tr>`;
        }).join('');

      } catch (err) {
        tbody.innerHTML = `<tr class="state-row"><td colspan="7">Errore nel caricamento della classifica.</td></tr>`;
      }
    }

    loadHeader();
    loadLeaderboard();
  </script>
</body>
</html>
