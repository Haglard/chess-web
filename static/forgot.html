<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Password dimenticata — Vibe Chess</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --accent: #58a6ff; --purple: #a78bfa; --green: #3fb950;
  --red: #f85149; --text: #e6edf3; --muted: #8b949e;
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
}
header {
  background: rgba(22,27,34,.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 32px; height: 58px;
  display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50;
}
.logo {
  font-size: 20px; font-weight: 800; text-decoration: none;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
header nav { margin-left: auto; display: flex; gap: 6px; align-items: center; }
#headerAuth { display: flex; gap: 6px; align-items: center; }
.nav-btn {
  font-size: 13px; font-weight: 500; text-decoration: none; padding: 5px 12px;
  border-radius: 6px; transition: all .15s; border: none; cursor: pointer;
  background: rgba(88,166,255,.1); color: var(--accent);
}
.nav-btn:hover { background: rgba(88,166,255,.18); }
.nav-btn-outline {
  background: rgba(255,255,255,.05); color: var(--text); border: 1px solid var(--border);
}
main {
  flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 36px 40px; width: 420px; max-width: 100%;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.card-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.card-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.field input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); padding: 10px 14px; font-size: 14px; outline: none;
  transition: border-color .15s;
}
.field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,.12); }
.btn {
  width: 100%; padding: 11px; border-radius: 8px; border: none; font-size: 15px;
  font-weight: 700; cursor: pointer; transition: all .18s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--purple)); color: #fff;
  box-shadow: 0 4px 18px rgba(88,166,255,.3);
}
.btn-primary:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.success-msg {
  color: var(--green); font-size: 13px; margin-bottom: 14px;
  padding: 12px; background: rgba(63,185,80,.08); border-radius: 6px;
  border: 1px solid rgba(63,185,80,.2); display: none;
}
.links { margin-top: 20px; text-align: center; font-size: 13px; color: var(--muted); }
.links a { color: var(--accent); text-decoration: none; }
.links a:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
  <a href="/" class="logo">♟ VibChess</a>
  <nav><div id="headerAuth"></div></nav>
</header>

<main>
  <div class="card">
    <div class="card-title">🔑 Password dimenticata</div>
    <div class="card-sub">Inserisci la tua email e ti invieremo le istruzioni per reimpostare la password.</div>

    <div class="success-msg" id="successMsg">
      ✓ Se l'email esiste nel sistema riceverai un link per reimpostare la password.
      Controlla anche la cartella spam.
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@esempio.it" autocomplete="email">
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="doForgot()">Invia link di reset</button>

    <div class="links">
      <a href="/login">← Torna al login</a>
    </div>
  </div>
</main>

<script>
async function loadHeader() {
  try {
    const r = await fetch('/api/auth/me');
    const u = await r.json();
    const el = document.getElementById('headerAuth');
    if (u.logged_in) {
      el.innerHTML = `
        <a href="/profile/${u.alias}" style="color:var(--text);text-decoration:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px">
          <span style="font-size:18px">${u.avatar}</span>${u.alias}
        </a>
        <button class="nav-btn nav-btn-outline" onclick="logout()">Esci</button>`;
    } else {
      el.innerHTML = `
        <a href="/login" class="nav-btn">Accedi</a>
        <a href="/register" class="nav-btn nav-btn-outline">Registrati</a>`;
    }
  } catch(e) {}
}
async function logout() {
  await fetch('/api/auth/logout', {method:'POST'});
  location.href = '/';
}
loadHeader();

async function doForgot() {
  const email = document.getElementById('email').value.trim();
  const btn   = document.getElementById('submitBtn');
  if (!email) return;
  btn.disabled = true; btn.textContent = 'Invio…';
  try {
    await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email})
    });
  } catch(e) {}
  document.getElementById('successMsg').style.display = 'block';
  btn.textContent = 'Link inviato';
}

document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') doForgot(); });
</script>
</body>
</html>
